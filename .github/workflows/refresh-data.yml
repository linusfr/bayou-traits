name: Refresh Data

# Run manually after a Hunt patch, or automatically on schedule.
# This commits an updated data.json which then triggers the deploy workflow.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'    # every Monday at 10:00 UTC

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: cd scraper && uv sync

      - name: Run data pipeline
        run: cd scraper && uv run python build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/data.json
          PATCH=$(jq -r '.meta.patch' frontend/src/data.json)
          git diff --staged --quiet || git commit -m "chore(data): refresh for patch ${PATCH}"
          git push
